<!DOCTYPE html>

<html>

<head>

<title>Signup | AI Study Planner</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb
);

}

.container{

width:500px;

padding:45px;

border-radius:30px;

background:
rgba(
255,
255,
255,
0.12
);

backdrop-filter:
blur(18px);

box-shadow:
0 20px 50px rgba(
0,
0,
0,
0.35
);

}

.logo{

font-size:65px;

text-align:center;

}

.title{

color:white;

font-size:38px;

text-align:center;

margin-top:10px;

}

.subtitle{

color:#cbd5e1;

text-align:center;

margin-top:8px;

margin-bottom:30px;

}

form{

display:flex;

flex-direction:column;

gap:18px;

}

form p{

color:white;

}

input{

width:100%;

padding:15px;

border:none;

border-radius:14px;

font-size:16px;

margin-top:8px;

}

button{

padding:16px;

background:#2563eb;

border:none;

color:white;

font-size:18px;

border-radius:14px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

transform:
translateY(-2px);

}

.links{

text-align:center;

margin-top:25px;

}

.links a{

color:#93c5fd;

text-decoration:none;

display:block;

margin-top:12px;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

🚀

</div>

<h1 class="title">

Create Account

</h1>

<p class="subtitle">

Join AI Study Planner

</p>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">

Signup

</button>

</form>

<div class="links">

<a href="/login/">

Already have an account? Login

</a>



</div>

</div>

</body>

</html>
