<!DOCTYPE html>

<html>

<head>

<title>AI Study Planner</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb
);

}

.container{

width:800px;

background:
rgba(
255,
255,
255,
0.1
);

backdrop-filter:
blur(20px);

padding:50px;

border-radius:30px;

text-align:center;

box-shadow:
0 20px 50px rgba(
0,
0,
0,
0.3
);

}

.logo{

font-size:60px;

}

.title{

color:white;

font-size:48px;

margin-top:10px;

}

.subtitle{

color:#dbeafe;

margin-top:15px;

font-size:20px;

margin-bottom:40px;

}

.grid{

display:grid;

grid-template-columns:
1fr 1fr;

gap:20px;

}

.btn{

display:block;

padding:18px;

background:white;

color:#0f172a;

text-decoration:none;

font-size:20px;

font-weight:bold;

border-radius:16px;

transition:.3s;

}

.btn:hover{

transform:
translateY(-5px);

background:
#e0e7ff;

}

.footer{

margin-top:35px;

color:#cbd5e1;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

📚

</div>

<h1 class="title">

AI Study Planner

</h1>

<p class="subtitle">

Plan smarter • Study better • Track progress

</p>

<div class="grid">


<a
href="/add/"
class="btn"

>

➕ Add Subject

</a>

<a
href="/dashboard/"
class="btn"

>

📊 Dashboard

</a>

<a
href="/timetable/"
class="btn"

>

⚡ Generate Timetable

</a>

<a href="/chat/"
class="btn"

>

🤖 AI Chatbot

</a>

<a href="/user_logout/" class="btn"

>

🚪 Logout

</a>

</div>

<div class="footer">

Built with Django + AI

</div>

</div>

</body>

</html>
