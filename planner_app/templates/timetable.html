<!DOCTYPE html>

<html>

<head>

<title>AI Timetable | Study Planner</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb
);

padding:40px;

}

.card{

width:850px;

background:
rgba(
255,
255,
255,
0.12
);

backdrop-filter:
blur(20px);

padding:45px;

border-radius:30px;

box-shadow:
0 20px 50px rgba(
0,
0,
0,
0.35
);

}

.icon{

text-align:center;

font-size:60px;

}

.title{

text-align:center;

color:white;

font-size:42px;

margin-top:10px;

}

.subtitle{

text-align:center;

color:#cbd5e1;

margin-top:10px;

margin-bottom:35px;

}

.result{

background:
rgba(
255,
255,
255,
0.12
);

padding:30px;

border-radius:18px;

color:white;

font-size:20px;

line-height:2;

white-space:pre-wrap;

border-left:
8px solid #22c55e;

}

.buttons{

margin-top:35px;

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.btn{

padding:15px 28px;

background:#2563eb;

color:white;

text-decoration:none;

border-radius:14px;

font-size:18px;

transition:.3s;

}

.btn:hover{

background:#1d4ed8;

transform:
translateY(-3px);

}

.footer{

margin-top:25px;

text-align:center;

color:#bfdbfe;

}

</style>

</head>

<body>

<div class="card">

<div class="icon">

⚡

</div>

<h1 class="title">

Generated Study Timetable

</h1>

<p class="subtitle">

Your personalized AI study schedule

</p>

<div class="result">

{{ result }}

</div>

<div class="buttons">

<a href="/export/"
class="btn"

>

📄 Export Timetable PDF

</a>

<a
href="/dashboard/"
class="btn"

>

📊 Dashboard

</a>

<a
href="/add/"
class="btn"

>

➕ Add Subject

</a>

<a
href="/home/"
class="btn"

>

🏠 Home

</a>

</div>

<div class="footer">

Study smarter • Stay consistent

</div>

</div>

</body>

</html>
