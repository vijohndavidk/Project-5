<!DOCTYPE html>

<html>

<head>

<title>Success | AI Study Planner</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb
);

}

.card{

width:700px;

padding:50px;

border-radius:30px;

text-align:center;

background:
rgba(
255,
255,
255,
0.12
);

backdrop-filter:
blur(18px);

box-shadow:
0 20px 50px rgba(
0,
0,
0,
0.35
);

}

.icon{

font-size:80px;

}

.title{

color:white;

font-size:42px;

margin-top:20px;

}

.message{

color:#dbeafe;

font-size:22px;

margin-top:20px;

line-height:1.8;

}

.buttons{

margin-top:40px;

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.btn{

padding:16px 28px;

background:#22c55e;

color:white;

text-decoration:none;

border-radius:14px;

font-size:18px;

}

.btn:hover{

background:#16a34a;

}

.home{

background:#2563eb;

}

.home:hover{

background:#1d4ed8;

}

</style>

</head>

<body>

<div class="card">

<div class="icon">

🎉

</div>

<h1 class="title">

Success

</h1>

<div class="message">

{{ message }}

</div>

<div class="buttons">

<a
href="/home/"
class="btn home"

>

🏠 Home

</a>

<a
href="/dashboard/"
class="btn"

>

📊 Dashboard

</a>

</div>

</div>

</body>

</html>
