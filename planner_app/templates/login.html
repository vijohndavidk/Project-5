<!DOCTYPE html>

<html>

<head>

<title>Login | AI Study Planner</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb
);

}

.box{

width:430px;

padding:45px;

border-radius:28px;

background:
rgba(
255,
255,
255,
0.12
);

backdrop-filter:
blur(20px);

box-shadow:
0 20px 50px rgba(
0,
0,
0,
0.35
);

}

.logo{

font-size:60px;

text-align:center;

margin-bottom:10px;

}

.title{

text-align:center;

font-size:36px;

color:white;

}

.subtitle{

text-align:center;

color:#cbd5e1;

margin-top:10px;

margin-bottom:30px;

}

input{

width:100%;

padding:16px;

margin-bottom:18px;

border:none;

border-radius:14px;

font-size:16px;

outline:none;

}

button{

width:100%;

padding:16px;

border:none;

border-radius:14px;

background:#2563eb;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

transform:
translateY(-2px);

}

.error{

color:#ffb4b4;

text-align:center;

margin-bottom:15px;

}

.links{

margin-top:25px;

text-align:center;

}

.links a{

display:block;

color:#93c5fd;

text-decoration:none;

margin-top:12px;

}

</style>

</head>

<body>

<div class="box">

<div class="logo">

🤖

</div>

<h1 class="title">

Welcome Back

</h1>

<p class="subtitle">

Login to AI Study Planner

</p>

{% if message %}

<p
style="
color:red;
text-align:center;
"
>

{{ message }}

</p>

{% endif %}

<form method="POST">

{% csrf_token %}

<input

type="text"

name="username"

placeholder="Enter Username"

required

>

<input

type="password"

name="password"

placeholder="Enter Password"

required

>

<button type="submit">

Login

</button>

</form>

<div class="links">

<a href="/signup/">

Create Account

</a>


</div>

</div>

</body>

</html>
